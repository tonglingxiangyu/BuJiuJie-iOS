name: Build unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build BuJiuJie for iPhone
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned app
        run: |
          set -o pipefail
          xcodebuild \
            -project BuJiuJie.xcodeproj \
            -scheme BuJiuJie \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Verify app icon was compiled
        run: |
          test -f build/Build/Products/Release-iphoneos/BuJiuJie.app/Assets.car
          plutil -p build/Build/Products/Release-iphoneos/BuJiuJie.app/Info.plist | grep -q CFBundleIcon

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/BuJiuJie.app Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload BuJiuJie-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BuJiuJie-unsigned-IPA
          path: BuJiuJie-unsigned.ipa
          if-no-files-found: error
          retention-days: 30
